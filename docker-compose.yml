services:
  app:
    # Conteneur PHP-FPM qui exécute Laravel.
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: aaa-api-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aaa-network

  web:
    # Nginx reçoit les requêtes HTTP et les transmet à PHP-FPM.
    image: nginx:1.27-alpine
    container_name: aaa-api-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - aaa-network

  db:
    # Base MySQL du projet.
    image: mysql:8.4
    container_name: aaa-api-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aaa_api
      MYSQL_USER: aaa_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      # Port local 3307 pour éviter les conflits avec un MySQL déjà installé.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - aaa-network

volumes:
  # Persistance de la base de données.
  mysql_data:
  # On sépare vendor pour éviter certains problèmes de droits ou de performances.
  vendor_data:

networks:
  aaa-network:
    driver: bridge
