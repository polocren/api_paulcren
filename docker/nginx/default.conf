server {
    listen 80;
    server_name localhost;

    # Le dossier public est le seul qui doit être exposé par Nginx.
    root /var/www/html/public;
    index index.php index.html;
    charset utf-8;

    location / {
        # Si le fichier demandé n'existe pas, Laravel prend le relais via index.php.
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Le service "app" correspond au conteneur PHP-FPM du docker-compose.
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        # Empêche l'accès aux fichiers cachés comme .env.
        deny all;
    }
}
